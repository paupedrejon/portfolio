name: TealCode Release

on:
  push:
    tags:
      - "tealcode-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            artifact_name: TealCode-setup.exe
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            artifact_name: TealCode-aarch64.dmg
          - platform: ubuntu-22.04
            args: "--target x86_64-unknown-linux-gnu"
            artifact_name: TealCode.AppImage

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tealcode/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tealcode/src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Generate icons
        working-directory: tealcode
        run: python scripts/generate-icons.py

      - name: Install frontend dependencies
        working-directory: tealcode
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tealcode
          tagName: ${{ github.ref_name }}
          releaseName: "TealCode ${{ github.ref_name }}"
          releaseBody: |
            IDE con IA china — descarga para tu plataforma.

            ## Instalación
            - **Windows**: ejecuta el `.exe`
            - **macOS**: abre el `.dmg`
            - **Linux**: haz ejecutable el `.AppImage`

            ## IA gratuita
            - Local: instala [Ollama](https://ollama.com) y `ollama pull qwen3-coder-next`
            - Cloud: configura API key de DeepSeek, Qwen o GLM en Ajustes
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: tealcode/src-tauri/target/release/bundle/
